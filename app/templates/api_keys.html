<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>API Keys</title>

    <style>

        body{
            background:#001133;
            color:white;
            font-family:Arial;
            padding:50px;
        }

        h1{
            font-size:60px;
            margin-bottom:10px;
        }

        p{
            color:#cccccc;
            margin-bottom:40px;
        }

        .top-buttons{

            display:flex;
            gap:20px;
            margin-bottom:40px;
        }

        .generate-btn{

            background:#00ffd5;
            color:black;
            border:none;
            padding:15px 30px;
            font-size:18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
        }

        .generate-btn:hover{

            background:white;
        }

        .playground-btn{

            background:white;
            color:black;
            text-decoration:none;
            padding:15px 30px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
        }

        .playground-btn:hover{

            background:#dddddd;
        }

        table{

            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }

        th{

            background:#1f2d5a;
            padding:20px;
            text-align:left;
            font-size:18px;
        }

        td{

            padding:20px;
            border-bottom:1px solid #1f2d5a;
        }

        .action-buttons{

            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .save-btn{

            background:#00ffd5;
            color:black;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .delete-btn{

            background:#ff4d4d;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .save-btn:hover{

            background:white;
        }

        .delete-btn:hover{

            background:#ff8080;
        }

        .back-btn{

            display:inline-block;
            margin-top:40px;
            background:white;
            color:black;
            text-decoration:none;
            padding:15px 30px;
            border-radius:10px;
            font-weight:bold;
        }

        .back-btn:hover{

            background:#dddddd;
        }

    </style>

</head>

<body>

<h1>API Keys</h1>

<p>

    Generate and manage your API access keys

</p>

<div class="top-buttons">

    <form action="/generate-api-key" method="post">

        <button
            type="submit"
            class="generate-btn"
        >

            Generate API Key

        </button>

    </form>

    <a href="/playground" class="playground-btn">

        Open Playground

    </a>

</div>

<table>

    <thead>

    <tr>

        <th>ID</th>

        <th>API Key</th>

        <th>Actions</th>

    </tr>

    </thead>

    <tbody>

    {% for key in api_keys %}

    <tr>

        <td>

            {{ key.id }}

        </td>

        <td>

            {{ key.api_key }}

        </td>

        <td>

            <div class="action-buttons">

                <button
                    type="button"
                    onclick="saveKey('{{ key.api_key }}')"
                >
                    Use In Playground
                </button>

                <form
                    action="/delete-api-key/{{ key.id }}"
                    method="post"
                >

                    <button
                        type="submit"
                        class="delete-btn"
                    >

                        Delete

                    </button>

                </form>

            </div>

        </td>

    </tr>

    {% endfor %}

    </tbody>

</table>

<a href="/dashboard" class="back-btn">

    ← Back to Dashboard

</a>

<script>



function saveKey(apiKey){

    alert("Button Clicked");

    console.log("Saving API KEY:", apiKey);

    localStorage.setItem(
        "api_key",
        apiKey
    );

    alert("API Key Saved");

    window.location.href = "/playground";
}

</script>
</body>

</html>
