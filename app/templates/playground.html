<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>MeterFlow Playground</title>

    <link rel="stylesheet"
          href="/static/style.css?v=10">

</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="logo-box">
            ⚡
        </div>

        <h1 class="logo">
            MeterFlow
        </h1>

        <p class="subtitle">
            API Playground
        </p>

        <nav class="nav-links">

            <a href="/dashboard">
                📊 Dashboard
            </a>

            <a href="/api-keys">
                🔑 API Keys
            </a>

            <a href="/logs">
                📜 Logs
            </a>

            <a href="/billing">
                💳 Billing
            </a>

            <a href="/plans">
                💎 Plans
            </a>

            <a href="/logout">
                🚪 Logout
            </a>

        </nav>

    </aside>

    <!-- MAIN -->

    <main class="main-content">

        <div class="section-card">

            <h1 class="section-title">
                MeterFlow API Playground
            </h1>

            <p class="section-subtitle">
                Test your APIs in real-time
            </p>

            <!-- SAVED API KEY -->

            <div style="margin-bottom:20px;">

                <strong>Saved API Key:</strong>

                <div id="savedKey"
                     style="
                     margin-top:10px;
                     padding:12px;
                     background:#0f172a;
                     border-radius:10px;
                     word-break:break-all;
                     color:#22d3ee;
                     ">
                </div>

            </div>

            <!-- REQUEST URL -->

            <input
                type="text"
                id="endpoint"
                value="/gateway/todo"
                placeholder="/gateway/todo"
                style="
                width:100%;
                padding:15px;
                border:none;
                border-radius:12px;
                margin-bottom:20px;
                font-size:16px;
                ">

            <!-- BUTTONS -->

            <div style="
                display:flex;
                gap:15px;
                flex-wrap:wrap;
                margin-bottom:20px;
            ">

                <button onclick="sendRequest()"
                        class="generate-btn">
                    🚀 Send API Request
                </button>

                <button onclick="copyResponse()"
                        class="generate-btn">
                    📋 Copy Response
                </button>

                <button onclick="clearApiKey()"
                        class="delete-btn">
                    ❌ Clear API Key
                </button>

                <a href="/dashboard"
                   class="generate-btn"
                   style="
                   text-decoration:none;
                   display:inline-flex;
                   align-items:center;
                   justify-content:center;
                   ">
                    ⬅ Back To Dashboard
                </a>

            </div>

            <!-- RESPONSE -->

            <div id="responseBox"
                 style="
                 background:#0f172a;
                 padding:20px;
                 border-radius:14px;
                 min-height:220px;
                 overflow:auto;
                 white-space:pre-wrap;
                 color:#ffffff;
                 font-family:monospace;
                 ">

                Response will appear here...

            </div>

        </div>

    </main>

</div>

<script>

const apiKey = localStorage.getItem("api_key");

document.getElementById(
    "savedKey"
).innerText = apiKey || "No API Key Saved";

async function sendRequest() {

    const endpoint =
        document.getElementById(
            "endpoint"
        ).value;

    const responseBox =
        document.getElementById(
            "responseBox"
        );

    if (!apiKey) {

        alert("Please save API key first");

        return;
    }

    responseBox.innerText =
        "Loading...";

    try {

        const response = await fetch(
            endpoint,
            {
                method: "GET",

                headers: {
                    "x-api-key": apiKey
                }
            }
        );

        const data =
            await response.json();

        responseBox.innerText =
            JSON.stringify(
                data,
                null,
                2
            );

    } catch (error) {

        responseBox.innerText =
            error;

    }

}

function clearApiKey() {

    localStorage.removeItem(
        "api_key"
    );

    location.reload();

}

function copyResponse() {

    const text =
        document.getElementById(
            "responseBox"
        ).innerText;

    navigator.clipboard.writeText(
        text
    );

    alert("Response copied");

}

</script>

</body>
</html>
