<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>API Playground</title>

    <style>

        body{
            background:#001133;
            color:white;
            font-family:Arial;
            padding:50px;
        }

        h1{
            margin-bottom:30px;
        }

        input{

            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            font-size:18px;
        }

        button{

            padding:15px 30px;
            border:none;
            background:#00ffd5;
            color:black;
            font-size:18px;
            cursor:pointer;
            border-radius:10px;
        }

        pre{

            margin-top:30px;
            background:#1f2d5a;
            padding:20px;
            border-radius:10px;
            overflow:auto;
        }

    </style>

</head>

<body>

<h1>MeterFlow API Playground</h1>

<input
    type="text"
    id="endpoint"
    value="/gateway/todo"
>

<button onclick="sendRequest()">

    Send API Request

</button>

<pre id="result">

Response will appear here...

</pre>

<script>

async function sendRequest(){

    // GET API KEY

    let apiKey = localStorage.getItem("api_key");

    console.log("API KEY =", apiKey);

    // CHECK KEY

    if(!apiKey){

        alert("Please save API key first");

        return;
    }

    // GET ENDPOINT

    let endpoint = document.getElementById(
        "endpoint"
    ).value;

    console.log("ENDPOINT =", endpoint);

    try{

        // SEND REQUEST

        let response = await fetch(
            endpoint,
            {
                method: "GET",

                headers: {
                    "x-api-key": apiKey
                }
            }
        );

        console.log("STATUS =", response.status);

        // GET RAW TEXT

        let result = await response.text();

        console.log("RESULT =", result);

        // SHOW RESPONSE

        document.getElementById(
            "result"
        ).innerText = result;

    }

    catch(error){

        console.log(error);

        document.getElementById(
            "result"
        ).innerText = error;
    }
}

</script>

</body>

</html>
